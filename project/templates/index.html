<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Máquina por Gestos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Controle de Máquina</h1>
            <div class="user-info">
                Usuário: <strong id="current-user">{{ username }}</strong> | 
                <a href="/logout">Sair</a>
            </div>
        </header>
        
        <div class="main-content">
            <div class="video-section">
                <div class="video-container">
                    <img src="{{ url_for('video_feed') }}" alt="Webcam Feed">
                </div>

                <div id="status-indicator" class="status neutral">
                    <span id="status-dot">🔴</span>
                    <span id="status-text">Aguardando gesto...</span>
                </div>
                
                <div class="machine-simulation">
                    <h3>Estado da Máquina</h3>
                    <div id="machine-display" class="machine-off">
                        DESLIGADA
                    </div>
                    <div class="machine-controls-info">
                        <span>👍 Ligar (Joinha)</span>
                        <span>🤙 Desligar (Hang Loose)</span>
                    </div>
                </div>
            </div>

            <div class="log-section">
                <h2>Histórico de Ações</h2>
                <ul id="log-list">
                    <!-- Registros aparecerão aqui -->
                </ul>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
